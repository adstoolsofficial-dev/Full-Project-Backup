<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير ملفات الأدوات | بوابة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <link rel="stylesheet" href="admin_shared.css">

    <style>
        /* ================= شاشة التحميل (Loader) ================= */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-body);
            z-index: 9999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        body.layout-ready #loader {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ================= تصميم متصفح الملفات ================= */
        .breadcrumbs { background: var(--bg-container); padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 15px;}
        .breadcrumbs span { cursor: pointer; color: var(--text-sub); transition: 0.2s;}
        .breadcrumbs span:hover { color: var(--primary-color);}
        .breadcrumbs .active { color: var(--primary-color); cursor: default;}
        .breadcrumbs i { color: var(--text-sub); font-size: 12px;}

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px;}
        
        .item-card { background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative;}
        .item-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-color: var(--primary-color);}
        
        .item-icon { font-size: 50px; margin-bottom: 15px; }
        .folder-icon { color: #fbbf24; }
        .file-icon-html { color: #e34f26; }
        .file-icon-js { color: #f7df1e; }
        .file-icon-css { color: #264de4; }
        .file-icon-txt { color: #94a3b8; }
        
        .item-title { font-weight: 700; color: var(--text-main); font-size: 16px; margin-bottom: 5px; word-break: break-all;}
        .item-subtitle { font-size: 12px; color: var(--text-sub);}

        .delete-btn { position: absolute; top: 10px; left: 10px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: none; transition: 0.2s;}
        .item-card:hover .delete-btn { display: flex; align-items: center; justify-content: center;}
        .delete-btn:hover { background: #ef4444; color: white;}

        .top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap;}
        .add-btn { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; display: flex; align-items: center; gap: 8px;}
        .add-btn:hover { filter: brightness(0.9); }

        /* ================= محرر الأكواد (Code Editor) ================= */
        .editor-container { display: none; background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; margin-bottom: 30px;}
        .editor-header { background: #1e1e1e; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: #d4d4d4;}
        .editor-title { font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 10px;}
        .editor-actions button { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; font-size: 13px;}
        .editor-actions .btn-close { background: #ef4444; margin-right: 10px;}
        
        .CodeMirror { height: 600px; font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; direction: ltr; text-align: left; }

        /* ================= النوافذ المنبثقة ================= */
        .modal { display: none; position: fixed; z-index: 100000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-container); padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; border-top: 5px solid var(--primary-color); }
        .modal-content h3 { margin-top: 0; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; color: var(--text-sub); }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-family: 'Cairo'; background: var(--bg-body); color: var(--text-main); }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;}
        .btn-cancel { background: var(--bg-body); color: var(--text-sub); border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight:bold;}
        .btn-confirm { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight:bold;}
    </style>
</head>
<body>
    
    <div id="loader">
        <i class="fa-solid fa-shield-halved fa-beat-fade fa-3x" style="margin-bottom: 15px;"></i>
        <h3 style="font-family: 'Cairo'; color: var(--text-main);">جاري التحقق من الصلاحيات...</h3>
    </div>
    
    <main class="main-wrapper" id="mainWrapper">
        <div class="top-actions">
            <div>
                <h2 style="color: var(--text-main); margin: 0; font-size: 24px;"><i class="fa-solid fa-folder-tree" style="color: var(--primary-color);"></i> مدير ملفات الأدوات</h2>
                <span style="color: var(--text-sub); font-size: 14px;">إدارة مجلدات الأدوات وإنشاء الملفات البرمجية وتعديلها مباشرة</span>
            </div>
            <button id="addMainBtn" class="add-btn" onclick="openCreateFolderModal()"><i class="fa-solid fa-folder-plus"></i> إنشاء مجلد أداة جديد</button>
        </div>

        <div class="breadcrumbs">
            <span onclick="goHome()"><i class="fa-solid fa-house"></i> الأدوات (المجلد الرئيسي)</span>
            <span id="breadcrumbSeparator" style="display:none;"><i class="fa-solid fa-chevron-left"></i></span>
            <span id="breadcrumbCurrent" class="active" style="display:none;"></span>
        </div>

        <div id="itemsGrid" class="grid-container">
            </div>

        <div id="codeEditorContainer" class="editor-container">
            <div class="editor-header">
                <div class="editor-title">
                    <i id="editorFileIcon" class="fa-brands fa-html5"></i> 
                    <span id="editorFileName">index.html</span>
                </div>
                <div class="editor-actions">
                    <button class="btn-close" onclick="closeEditor()"><i class="fa-solid fa-xmark"></i> إغلاق</button>
                    <button onclick="saveCode()"><i class="fa-solid fa-floppy-disk"></i> حفظ الكود</button>
                </div>
            </div>
            <textarea id="codeTextarea"></textarea>
            <input type="hidden" id="currentEditingFileId">
        </div>
    </main>

    <div id="folderModal" class="modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-folder-plus"></i> مجلد أداة جديد</h3>
            <div class="form-group">
                <label>اسم المجلد (بالإنجليزية - بدون مسافات)</label>
                <input type="text" id="folderSystemName" placeholder="مثال: date_tools" style="direction: ltr; text-align: left;">
            </div>
            <div class="form-group">
                <label>الاسم المعروض (بالعربية)</label>
                <input type="text" id="folderDisplayName" placeholder="مثال: أدوات التاريخ">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="document.getElementById('folderModal').style.display='none'">إلغاء</button>
                <button class="btn-confirm" onclick="createFolder()">إنشاء المجلد</button>
            </div>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-file-code"></i> ملف برمجي جديد</h3>
            <div class="form-group">
                <label>اسم الملف (مع الامتداد)</label>
                <input type="text" id="fileName" placeholder="مثال: index.html" style="direction: ltr; text-align: left;">
            </div>
            <div class="form-group">
                <label>نوع الملف وتنسيقه</label>
                <select id="fileType">
                    <option value="html">HTML Document (.html)</option>
                    <option value="css">CSS Stylesheet (.css)</option>
                    <option value="javascript">JavaScript (.js)</option>
                    <option value="json">JSON Data (.json)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="document.getElementById('fileModal').style.display='none'">إلغاء</button>
                <button class="btn-confirm" onclick="createFile()">إنشاء الملف</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { initAdminLayout } from './admin_shared.js'; 

        const firebaseConfig = {
            apiKey: "AIzaSyAgdxyNBFrwJuAnoVq6OmZKZZvRknFyVQ8",
            authDomain: "date-tool-official.firebaseapp.com",
            projectId: "date-tool-official",
            storageBucket: "date-tool-official.firebasestorage.app",
            messagingSenderId: "219114793241",
            appId: "1:219114793241:web:ee933836c68f7e712fbd88"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentFolderId = null; 
        let editorInstance = null; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const adminData = await initAdminLayout(auth, db, 'tools'); 
                    if (adminData.role !== 'super_admin' && !adminData.permissions?.manage_tools) {
                        window.location.href = 'admin.html'; return;
                    }
                    
                    // إخفاء اللودر إجبارياً بعد التحقق بنجاح
                    const loader = document.getElementById('loader');
                    if(loader) loader.style.display = 'none';
                    document.body.classList.add('layout-ready');

                    initEditor();
                    loadFolders();
                } catch (error) { 
                    console.error("خطأ:", error); 
                    const loader = document.getElementById('loader');
                    if(loader) loader.innerHTML = `<h3 style="color: #ef4444; font-family: 'Cairo';">حدث خطأ. افتح F12 لمعرفة السبب.</h3>`;
                }
            } else {
                window.location.href = 'admin_login.html';
            }
        });

        // ================= تهيئة محرر الأكواد =================
        function initEditor() {
            const textarea = document.getElementById('codeTextarea');
            editorInstance = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                theme: 'dracula',
                mode: 'htmlmixed',
                indentUnit: 4,
                lineWrapping: true,
                autoCloseTags: true,
                autoCloseBrackets: true
            });
        }

        // ================= إدارة المجلدات (الأدوات) =================
        async function loadFolders() {
            currentFolderId = null;
            document.getElementById('itemsGrid').style.display = 'grid';
            document.getElementById('codeEditorContainer').style.display = 'none';
            document.getElementById('breadcrumbSeparator').style.display = 'none';
            document.getElementById('breadcrumbCurrent').style.display = 'none';
            
            const btn = document.getElementById('addMainBtn');
            btn.innerHTML = '<i class="fa-solid fa-folder-plus"></i> إنشاء مجلد أداة جديد';
            btn.onclick = openCreateFolderModal;

            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center;"><i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...</div>';

            try {
                const snapshot = await getDocs(collection(db, "tool_folders"));
                grid.innerHTML = '';
                
                if(snapshot.empty) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color: var(--text-sub);">لا توجد مجلدات حالياً.</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    grid.innerHTML += `
                        <div class="item-card" onclick="openFolder('${doc.id}', '${data.displayName}')">
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteFolder('${doc.id}')" title="حذف المجلد"><i class="fa-solid fa-trash"></i></button>
                            <i class="fa-solid fa-folder item-icon folder-icon"></i>
                            <div class="item-title">${data.displayName}</div>
                            <div class="item-subtitle">/${data.systemName}</div>
                        </div>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        window.openCreateFolderModal = () => {
            document.getElementById('folderSystemName').value = '';
            document.getElementById('folderDisplayName').value = '';
            document.getElementById('folderModal').style.display = 'flex';
        };

        window.createFolder = async () => {
            const sysName = document.getElementById('folderSystemName').value.trim();
            const dispName = document.getElementById('folderDisplayName').value.trim();
            if(!sysName || !dispName) return alert('الرجاء تعبئة الحقول');

            try {
                await setDoc(doc(db, "tool_folders", sysName), {
                    systemName: sysName,
                    displayName: dispName,
                    createdAt: new Date().toISOString()
                });
                document.getElementById('folderModal').style.display = 'none';
                loadFolders();
            } catch (error) { alert('خطأ: ' + error.message); }
        };

        window.deleteFolder = async (folderId) => {
            if(!confirm('هل أنت متأكد من حذف هذا المجلد وجميع الملفات داخله نهائياً؟')) return;
            try {
                await deleteDoc(doc(db, "tool_folders", folderId));
                loadFolders();
            } catch (error) { alert('خطأ: ' + error.message); }
        };

        // ================= إدارة الملفات داخل المجلد =================
        window.goHome = () => loadFolders();

        window.openFolder = async (folderId, folderName) => {
            currentFolderId = folderId;
            document.getElementById('itemsGrid').style.display = 'grid';
            document.getElementById('codeEditorContainer').style.display = 'none';
            
            document.getElementById('breadcrumbSeparator').style.display = 'inline';
            const curr = document.getElementById('breadcrumbCurrent');
            curr.style.display = 'inline';
            curr.innerText = folderName;

            const btn = document.getElementById('addMainBtn');
            btn.innerHTML = '<i class="fa-solid fa-file-circle-plus"></i> إنشاء ملف كود جديد';
            btn.onclick = openCreateFileModal;

            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center;"><i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...</div>';

            try {
                const snapshot = await getDocs(collection(db, "tool_folders", folderId, "files"));
                grid.innerHTML = '';
                
                if(snapshot.empty) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color: var(--text-sub);">المجلد فارغ. ابدأ بإنشاء ملف جديد.</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    let iconClass = 'fa-solid fa-file-code file-icon-txt';
                    if(data.type === 'html') iconClass = 'fa-brands fa-html5 file-icon-html';
                    if(data.type === 'css') iconClass = 'fa-brands fa-css3-alt file-icon-css';
                    if(data.type === 'javascript') iconClass = 'fa-brands fa-js file-icon-js';

                    grid.innerHTML += `
                        <div class="item-card" onclick="openFileEditor('${doc.id}', '${data.name}', '${data.type}', '${btoa(encodeURIComponent(data.content || ''))}')">
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${doc.id}')" title="حذف الملف"><i class="fa-solid fa-trash"></i></button>
                            <i class="${iconClass} item-icon"></i>
                            <div class="item-title" style="direction:ltr;">${data.name}</div>
                            <div class="item-subtitle">${data.type.toUpperCase()} File</div>
                        </div>
                    `;
                });
            } catch (error) { console.error(error); }
        };

        window.openCreateFileModal = () => {
            document.getElementById('fileName').value = '';
            document.getElementById('fileType').value = 'html';
            document.getElementById('fileModal').style.display = 'flex';
        };

        window.createFile = async () => {
            const fileName = document.getElementById('fileName').value.trim();
            const fileType = document.getElementById('fileType').value;
            if(!fileName) return alert('أدخل اسم الملف');

            try {
                await addDoc(collection(db, "tool_folders", currentFolderId, "files"), {
                    name: fileName,
                    type: fileType,
                    content: '', // تم التعديل: المحتوى الافتراضي الآن فارغ تماماً
                    updatedAt: new Date().toISOString()
                });
                
                document.getElementById('fileModal').style.display = 'none';
                openFolder(currentFolderId, document.getElementById('breadcrumbCurrent').innerText);
            } catch (error) { alert('خطأ: ' + error.message); }
        };

        window.deleteFile = async (fileId) => {
            if(!confirm('حذف الملف نهائياً؟')) return;
            try {
                await deleteDoc(doc(db, "tool_folders", currentFolderId, "files", fileId));
                openFolder(currentFolderId, document.getElementById('breadcrumbCurrent').innerText);
            } catch (error) { alert('خطأ: ' + error.message); }
        };

        // ================= محرر الأكواد وظائفه =================
        window.openFileEditor = (fileId, fileName, fileType, encodedContent) => {
            document.getElementById('itemsGrid').style.display = 'none';
            document.getElementById('addMainBtn').style.display = 'none';
            document.getElementById('codeEditorContainer').style.display = 'block';
            
            document.getElementById('currentEditingFileId').value = fileId;
            document.getElementById('editorFileName').innerText = fileName;

            const iconEl = document.getElementById('editorFileIcon');
            let mode = 'htmlmixed';
            if(fileType === 'html') { iconEl.className = 'fa-brands fa-html5'; iconEl.style.color = '#e34f26'; }
            if(fileType === 'css') { iconEl.className = 'fa-brands fa-css3-alt'; iconEl.style.color = '#264de4'; mode = 'css';}
            if(fileType === 'javascript') { iconEl.className = 'fa-brands fa-js'; iconEl.style.color = '#f7df1e'; mode = 'javascript';}
            if(fileType === 'json') { iconEl.className = 'fa-solid fa-code'; iconEl.style.color = '#94a3b8'; mode = 'javascript';}

            editorInstance.setOption("mode", mode);
            
            const decoded = decodeURIComponent(atob(encodedContent));
            editorInstance.setValue(decoded);
            
            setTimeout(() => editorInstance.refresh(), 100);
        };

        window.closeEditor = () => {
            document.getElementById('codeEditorContainer').style.display = 'none';
            document.getElementById('addMainBtn').style.display = 'flex';
            openFolder(currentFolderId, document.getElementById('breadcrumbCurrent').innerText);
        };

        window.saveCode = async () => {
            const fileId = document.getElementById('currentEditingFileId').value;
            const newContent = editorInstance.getValue();
            
            const btn = document.querySelector('.editor-actions button:last-child');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            try {
                await setDoc(doc(db, "tool_folders", currentFolderId, "files", fileId), {
                    content: newContent,
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> تم الحفظ';
                    btn.style.backgroundColor = '#10b981';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.backgroundColor = '#3b82f6';
                        btn.disabled = false;
                    }, 2000);
                }, 500);

            } catch (error) { 
                alert('فشل الحفظ: ' + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
