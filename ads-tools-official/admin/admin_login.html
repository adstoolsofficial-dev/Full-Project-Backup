<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الإدارة الآمنة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: #0f172a; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px 15px; 
            box-sizing: border-box;
            overflow-y: auto;
        }

        .login-container {
            background: white;
            padding: 25px 20px 20px 20px; 
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 360px; 
            border-top: 5px solid #3b82f6;
            position: relative;
            margin: auto;
        }

        .lock-icon {
            position: absolute;
            top: -25px; 
            left: 50%;
            transform: translateX(-50%);
            background: #3b82f6;
            color: white;
            width: 50px; 
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 4px solid #0f172a;
        }

        .header {
            text-align: center;
            margin-bottom: 15px; 
            margin-top: 15px; 
        }
        .header h1 {
            margin: 0 0 5px 0;
            color: #1e293b;
            font-size: 20px; 
        }
        .header p {
            margin: 0;
            color: #64748b;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 12px; 
            text-align: right;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px; 
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 8px 35px 8px 12px; 
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px; 
            width: 100%;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-login:hover {
            background-color: #2563eb;
        }
        .btn-login:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .error-message {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 8px 10px; 
            border-radius: 8px;
            border: 1px solid #fecaca;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
            text-align: right;
            line-height: 1.4;
        }

        .back-link {
            text-align: center;
            margin-top: 12px;
            display: block;
            color: #64748b;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="lock-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <div class="header">
            <h1>بوابة الإدارة</h1>
            <p>الوصول مقتصر على المصرح لهم فقط</p>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fa-solid fa-circle-exclamation"></i> <span id="errorText"></span>
        </div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>البريد الإلكتروني للإدارة</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" required placeholder="admin@example.com" dir="ltr">
                </div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" required placeholder="••••••••" dir="ltr">
                </div>
            </div>

            <div class="captcha-container" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
               <img src="/api/captcha" id="captchaImage" alt="كابتشا" style="border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; flex: 1;" onclick="window.refreshCaptcha()" title="اضغط لتغيير الصورة">
               <button type="button" onclick="window.refreshCaptcha()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b;"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>

            <div class="form-group">
              <input type="text" id="captchaInput" placeholder="أدخل الرمز الموجود في الصورة" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" dir="ltr">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                تسجيل الدخول <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-right"></i> العودة للموقع العام</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgdxyNBFrwJuAnoVq6OmZKZZvRknFyVQ8",
            authDomain: "date-tool-official.firebaseapp.com",
            projectId: "date-tool-official",
            storageBucket: "date-tool-official.firebasestorage.app",
            messagingSenderId: "219114793241",
            appId: "1:219114793241:web:ee933836c68f7e712fbd88",
            measurementId: "G-ZKCJC1Y7X7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        function showError(msg) {
            errorText.innerText = msg;
            errorBox.style.display = 'block';
        }

        function hideError() {
            errorBox.style.display = 'none';
        }

        // دالة تحديث الكابتشا (تم جعلها Global لتعمل مع زر التحديث)
        window.refreshCaptcha = function() {
            document.getElementById('captchaImage').src = '/api/captcha?' + Date.now();
            document.getElementById('captchaInput').value = '';
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const captchaCode = document.getElementById('captchaInput').value.trim();

            if (!captchaCode) {
                showError("يرجى إدخال رمز الكابتشا.");
                return;
            }

            const originalBtnContent = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';
            loginBtn.disabled = true;

            try {
                // 1. التحقق من الكابتشا عبر السيرفر أولاً
                const verifyRes = await fetch('/api/verify-captcha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: captchaCode })
                });
                
                const result = await verifyRes.json();
                
                if (!result.success) {
                    showError(result.message);
                    window.refreshCaptcha(); // تحديث الصورة للمستخدم
                    loginBtn.innerHTML = originalBtnContent;
                    loginBtn.disabled = false;
                    return; // إيقاف العملية إذا الكابتشا خطأ
                }

                // 2. تسجيل الدخول عبر Firebase Auth (إذا الكابتشا صحيحة)
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 3. التحقق الأمني من صلاحيات الإدارة
                const adminDocRef = doc(db, "admins", user.uid);
                const adminDocSnap = await getDoc(adminDocRef);

                if (adminDocSnap.exists()) {
                    window.location.href = 'admin.html';
                } else {
                    await signOut(auth);
                    showError("عذراً، هذا الحساب لا يمتلك صلاحيات الدخول للوحة الإدارة.");
                    window.refreshCaptcha();
                    loginBtn.innerHTML = originalBtnContent;
                    loginBtn.disabled = false;
                }

            } catch (error) {
                window.refreshCaptcha();
                loginBtn.innerHTML = originalBtnContent;
                loginBtn.disabled = false;

                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    showError("البريد الإلكتروني أو كلمة المرور غير صحيحة.");
                } else if (error.code === 'auth/too-many-requests') {
                    showError("تم حظر الدخول مؤقتاً بسبب محاولات فاشلة كثيرة. يرجى المحاولة لاحقاً.");
                } else {
                    showError("حدث خطأ في الاتصال: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
