        :root {

            --text-main: #f8fafc;

            --input-bg: #0f172a;

            --primary: #60a5fa;

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;

            font-family: 'Cairo', sans-serif;

            color: var(--primary);
            border-color: var(--primary);
            background: transparent;
        }

            background: var(--bg-card);
            padding: 25px 30px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);

        @media (max-width: 768px) { .split-section { flex-direction: column; } }

        .date-dropdowns { display: flex; gap: 8px; margin: 12px 0 20px 0; }

            flex: 1; text-align: center; padding: 12px 5px; border: 1px solid var(--border-color);
            border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 600;

            border: 1px dashed rgba(34, 197, 94, 0.3);
        }

        label { font-weight: 600; color: var(--text-main); font-size: 13px; display: block; margin-top: 10px; }

        .ad-placeholder { 
            background-color: var(--ad-bg); border: 1px dashed var(--border-color); 
            text-align: center; padding: 15px; margin-bottom: 25px; color: var(--text-sub);

            display: flex; align-items: center; justify-content: center; min-height: 90px;

        .custom-ad-promo {
            border: 1px solid var(--border-color);

            color: var(--text-sub); 
            cursor: pointer;
            text-decoration: none;

        .custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);

    async function initAndTrackVisit() {
        const statsRef = doc(db, "statistics", "main");

            if (!snap.exists()) {
                await setDoc(statsRef, { visits: 1, ageCalc: 0, dateConverter: 0, durationCalc: 0 });

        en: { greg: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
              hijri: ['Muharram', 'Safar', 'Rabi al-Awwal', 'Rabi al-Thani', 'Jumada al-Awwal', 'Jumada al-Thani', 'Rajab', 'Shaaban', 'Ramadan', 'Shawwal', 'Dhu al-Qadah', 'Dhu al-Hijjah'] }
    };

    let currentLang = localStorage.getItem('site_lang') || 'ar';

    // ================= منطق الواجهة والسمة (Theme) =================
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    const themeBtn = document.getElementById('themeToggleBtn');
    const langBtn = document.getElementById('langToggleBtn');
    const themeIcon = themeBtn.querySelector('i');
    const osThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');

    const applyTheme = (isDark) => {
        if (isDark) { document.body.classList.add('dark-mode'); themeIcon.className = 'fa-solid fa-sun'; } 
        else { document.body.classList.remove('dark-mode'); themeIcon.className = 'fa-solid fa-moon'; }
    };

    const savedTheme = localStorage.getItem('site_theme');
    if (savedTheme !== null) applyTheme(savedTheme === 'dark');
    else applyTheme(osThemeQuery.matches);

    osThemeQuery.addEventListener('change', (e) => {
        applyTheme(e.matches);
        localStorage.removeItem('site_theme');
    });

    themeBtn.addEventListener('click', () => {
        const isDarkNow = document.body.classList.toggle('dark-mode');
        themeIcon.className = isDarkNow ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('site_theme', isDarkNow ? 'dark' : 'light');
    });

    // ================= منطق تغيير اللغة وبناء القوائم =================
    function buildDropdowns(lang) {
        const dict = i18n[lang];
        const mNames = monthNames[lang];

        const buildSelect = (selector, type, max, names, startYear, endYear) => {
            document.querySelectorAll(selector).forEach(select => {
                let val = select.value; // حفظ الاختيار الحالي إن وجد
                select.innerHTML = `<option value="">${dict[type]}</option>`;
                if (type === 'day') {
                    for(let i=1; i<=max; i++) select.innerHTML += `<option value="${i}" ${val==i?'selected':''}>${i}</option>`;
                } else if (type === 'month') {
                    names.forEach((name, idx) => {
                        let mVal = selector.includes('greg') ? (idx+1).toString().padStart(2,'0') : (idx+1);
                        select.innerHTML += `<option value="${mVal}" ${val==mVal?'selected':''}>${name}</option>`;
                    });
                } else if (type === 'year') {
                    for(let i=startYear; i>=endYear; i--) {
                        let isSelected = (val == i) ? 'selected' : (!val && i === (selector.includes('greg') ? 2026 : 1447) ? 'selected' : '');
                        select.innerHTML += `<option value="${i}" ${isSelected}>${i}</option>`;
                    }
                }
            });
        };

        buildSelect('.greg-day', 'day', 31); buildSelect('.hijri-day', 'day', 30);
        buildSelect('.greg-month', 'month', null, mNames.greg); buildSelect('.hijri-month', 'month', null, mNames.hijri);
        buildSelect('.greg-year', 'year', null, null, 2066, 1900); buildSelect('.hijri-year', 'year', null, null, 1487, 1300);
    }

    function applyLanguage(lang) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        langBtn.textContent = lang === 'ar' ? 'EN' : 'عربي';
        
        // تحديث النصوص الثابتة
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.textContent = i18n[lang][key];
        });

        buildDropdowns(lang);
        
        // إخفاء النتائج عند تغيير اللغة لتجنب تضارب النصوص القديمة
        document.querySelectorAll('.result').forEach(res => res.style.display = 'none');
    }

    langBtn.addEventListener('click', () => {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('site_lang', currentLang);
        applyLanguage(currentLang);
    });

    window.onload = function() {
        applyLanguage(currentLang);
    };

    // ================= دوال الموقع الرياضية =================
    function showNotification(messageKey, type = 'error') {
        const alertBox = document.getElementById('customAlert');
        const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation"></i> ' : '<i class="fa-solid fa-circle-check"></i> ';
        alertBox.innerHTML = icon + i18n[currentLang][messageKey];
        if (type === 'info') alertBox.classList.add('info'); else alertBox.classList.remove('info');
        alertBox.classList.add('show');
        setTimeout(() => alertBox.classList.remove('show'), 3000);
    }

    function formatDuration(years, months, days) {
        const dict = i18n[currentLang];
        function formatPart(value, singular, dual, plural, defaultPlural) {
            if (value === 0) return "";
            if (currentLang === 'en') return value === 1 ? `1 ${singular}` : `${value} ${plural}`;
            if (value === 1) return singular;
            if (value === 2) return dual;
            if (value >= 3 && value <= 10) return `${value} ${plural}`;
            return `${value} ${defaultPlural}`;
        }
        let yStr = formatPart(years, dict.y1, dict.y2, dict.y3, dict.y4);
        let mStr = formatPart(months, dict.m1, dict.m2, dict.m3, dict.m4);
        let dStr = formatPart(days, dict.d1, dict.d2, dict.d3, dict.d4);
        let parts = [yStr, mStr, dStr].filter(p => p !== "");
        if (parts.length === 0) return dict.sameDay;
        return parts.join(dict.and);
    }

    function getExactDifference(d1, d2) {
        let startDate = new Date(Math.min(d1, d2)); let endDate = new Date(Math.max(d1, d2));
        let years = endDate.getFullYear() - startDate.getFullYear(); let months = endDate.getMonth() - startDate.getMonth(); let days = endDate.getDate() - startDate.getDate();
        if (days < 0) { months--; let prevMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 0); days += prevMonth.getDate(); }
        if (months < 0) { years--; months += 12; }
        return { years, months, days };
    }

    function calculateAgeGreg() {
        const d = document.getElementById('gDayAge').value, m = document.getElementById('gMonthAge').value, y = document.getElementById('gYearAge').value;
        if(!d || !m || !y) return showNotification("errSelect");
        const birthDate = new Date(`${y}-${m}-${d}`); const today = new Date();
        if(birthDate > today) return showNotification("errFuture");
        const diff = getExactDifference(birthDate, today);
        const resBox = document.getElementById('ageResultGreg'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resAge}<br><span style="color:inherit;">${formatDuration(diff.years, diff.months, diff.days)}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('ageCalc');
    }

    function calcDiffGreg() {
        const d1 = document.getElementById('gDayDiff1').value, m1 = document.getElementById('gMonthDiff1').value, y1 = document.getElementById('gYearDiff1').value;
        const d2 = document.getElementById('gDayDiff2').value, m2 = document.getElementById('gMonthDiff2').value, y2 = document.getElementById('gYearDiff2').value;
        if(!d1 || !m1 || !y1 || !d2 || !m2 || !y2) return showNotification("errSelect");
        const date1 = new Date(`${y1}-${m1}-${d1}`), date2 = new Date(`${y2}-${m2}-${d2}`);
        const diff = getExactDifference(date1, date2);
        const resBox = document.getElementById('diffResultGreg'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resDiffText}<br><span style="color:inherit;">${formatDuration(diff.years, diff.months, diff.days)}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('durationCalc');
    }

    function convertGregToHijri() {
        const d = document.getElementById('gDayConv').value.padStart(2, '0'), m = document.getElementById('gMonthConv').value, y = document.getElementById('gYearConv').value;
        if(!d || !m || !y) return showNotification("errSelect");
        const gDate = new Date(`${y}-${m}-${d}`);
        const options = { year: 'numeric', month: 'long', day: 'numeric', calendar: 'islamic-umalqura' };
        const locale = currentLang === 'ar' ? 'ar-SA-u-ca-islamic-umalqura' : 'en-US-u-ca-islamic-umalqura';
        const hDate = new Intl.DateTimeFormat(locale, options).format(gDate);
        const resBox = document.getElementById('hijriResult'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resG2H}<br><span style="color:inherit;">${hDate}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('dateConverter');
    }

    function getHijriParts(dateObj) {
        const parts = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', { day: 'numeric', month: 'numeric', year: 'numeric' }).formatToParts(dateObj);
        let y, m, d; parts.forEach(p => { if(p.type === 'year') y = parseInt(p.value); if(p.type === 'month') m = parseInt(p.value); if(p.type === 'day') d = parseInt(p.value); });
        return { y, m, d };
    }

    function hijriToGregorian(hY, hM, hD) {
        let target = hY * 10000 + hM * 100 + hD; let minDays = Math.floor(new Date(1900, 0, 1).getTime() / 86400000); let maxDays = Math.floor(new Date(2100, 11, 31).getTime() / 86400000);
        let resultDays = minDays;
        for (let i = 0; i < 20; i++) {
            let midDays = Math.floor((minDays + maxDays) / 2); let midDate = new Date(midDays * 86400000); let p = getHijriParts(midDate); let midVal = p.y * 10000 + p.m * 100 + p.d;
            if (midVal === target) { resultDays = midDays; break; } else if (midVal < target) { minDays = midDays + 1; } else { maxDays = midDays - 1; }
        }
        return new Date(resultDays * 86400000);
    }

    function calculateAgeHijri() {
        const dVal = document.getElementById('hDayAge').value, mVal = document.getElementById('hMonthAge').value, yVal = document.getElementById('hYearAge').value;
        if(!dVal || !mVal || !yVal) return showNotification("errSelect");
        const bDay = parseInt(dVal), bMonth = parseInt(mVal), bYear = parseInt(yVal);
        const tp = getHijriParts(new Date()); const tDay = tp.d, tMonth = tp.m, tYear = tp.y;
        if (bYear > tYear || (bYear === tYear && bMonth > tMonth) || (bYear === tYear && bMonth === tMonth && bDay > tDay)) return showNotification("errFuture");
        let years = tYear - bYear, months = tMonth - bMonth, days = tDay - bDay;
        if (days < 0) { months--; days += 30; } if (months < 0) { years--; months += 12; }
        const resBox = document.getElementById('ageResultHijri'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resAgeH}<br><span style="color:inherit;">${formatDuration(years, months, days)}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('ageCalc');
    }

    function calcDiffHijri() {
        const d1Val = document.getElementById('hDayDiff1').value, m1Val = document.getElementById('hMonthDiff1').value, y1Val = document.getElementById('hYearDiff1').value;
        const dh2Val = document.getElementById('hDayDiff2').value, mh2Val = document.getElementById('hMonthDiff2').value, yh2Val = document.getElementById('hYearDiff2').value;
        if(!d1Val || !m1Val || !y1Val || !dh2Val || !mh2Val || !yh2Val) return showNotification("errSelect");
        let y1 = parseInt(y1Val), m1 = parseInt(m1Val), d1 = parseInt(d1Val); let y2 = parseInt(yh2Val), m2 = parseInt(mh2Val), d2 = parseInt(dh2Val);
        if (y1 > y2 || (y1 === y2 && m1 > m2) || (y1 === y2 && m1 === m2 && d1 > d2)) { let ty = y1, tm = m1, td = d1; y1 = y2; m1 = m2; d1 = d2; y2 = ty; m2 = tm; d2 = td; }
        let years = y2 - y1, months = m2 - m1, days = d2 - d1;
        if (days < 0) { months--; days += 30; } if (months < 0) { years--; months += 12; }
        const resBox = document.getElementById('diffResultHijri'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resDiffText}<br><span style="color:inherit;">${formatDuration(years, months, days)}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('durationCalc');
    }

    function convertHijriToGreg() {
        const dVal = document.getElementById('hDayConv').value, mVal = document.getElementById('hMonthConv').value, yVal = document.getElementById('hYearConv').value;
        if(!dVal || !mVal || !yVal) return showNotification("errSelect");
        let gDateObj = hijriToGregorian(parseInt(yVal), parseInt(mVal), parseInt(dVal));
        const options = { year: 'numeric', month: 'long', day: 'numeric' }; 
        const locale = currentLang === 'ar' ? 'ar-SA' : 'en-US';
        const gDateFormatted = new Intl.DateTimeFormat(locale, options).format(gDateObj);
        const suffix = currentLang === 'ar' ? ' م' : '';
        const resBox = document.getElementById('gregResult'); resBox.style.display = "block";
        resBox.innerHTML = `${i18n[currentLang].resH2G}<br><span style="color:inherit;">${gDateFormatted}${suffix}</span>`;
        if(window.trackToolUsage) window.trackToolUsage('dateConverter');
    }
</script>
